name: applypilot

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        - INSTALL_PLAYWRIGHT=true
    command: uvicorn applypilot.web.server:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - APPLYPILOT_DIR=/data
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=${FRONTEND_ORIGIN:-http://localhost}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    environment:
      - NODE_ENV=production
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    profiles:
      - ssl  # only runs when: docker compose --profile ssl run certbot ...
