name: applypilot-discovery

services:
  discovery:
    build:
      context: ..
      dockerfile: discovery-service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # If using local SQLite shared with the main app on the same machine:
    # volumes:
    #   - /path/to/your/data:/data
    #   DATABASE_URL=/data/applypilot.db in .env
