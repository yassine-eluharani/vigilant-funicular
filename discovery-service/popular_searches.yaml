# Popular job searches — always discovered regardless of user queries.
# These are high-volume, well-known roles that benefit all users in the pool.

queries:
  # ── High demand generalist roles ──────────────────────────────────────────
  - query: "Software Engineer"
    tier: 1
  - query: "Software Developer"
    tier: 1
  - query: "Full Stack Engineer"
    tier: 1
  - query: "Full Stack Developer"
    tier: 1
  - query: "Backend Engineer"
    tier: 1
  - query: "Frontend Engineer"
    tier: 1

  # ── AI / ML ───────────────────────────────────────────────────────────────
  - query: "Machine Learning Engineer"
    tier: 1
  - query: "AI Engineer"
    tier: 1
  - query: "ML Engineer"
    tier: 1
  - query: "LLM Engineer"
    tier: 1
  - query: "Data Scientist"
    tier: 1
  - query: "Data Engineer"
    tier: 2

  # ── Infrastructure / Platform ─────────────────────────────────────────────
  - query: "DevOps Engineer"
    tier: 1
  - query: "Platform Engineer"
    tier: 1
  - query: "Site Reliability Engineer"
    tier: 2
  - query: "Cloud Engineer"
    tier: 2
  - query: "Infrastructure Engineer"
    tier: 2

  # ── Language-specific ─────────────────────────────────────────────────────
  - query: "Python Engineer"
    tier: 2
  - query: "Python Developer"
    tier: 2
  - query: "TypeScript Engineer"
    tier: 2
  - query: "Go Engineer"
    tier: 2
  - query: "Rust Engineer"
    tier: 3

  # ── Mobile ────────────────────────────────────────────────────────────────
  - query: "iOS Engineer"
    tier: 2
  - query: "Android Engineer"
    tier: 2
  - query: "Mobile Engineer"
    tier: 2
  - query: "React Native Engineer"
    tier: 3

  # ── Broader tech ──────────────────────────────────────────────────────────
  - query: "Security Engineer"
    tier: 2
  - query: "Engineering Manager"
    tier: 3
  - query: "Product Manager"
    tier: 3
  - query: "Solutions Engineer"
    tier: 3
  - query: "QA Engineer"
    tier: 3

locations:
  - location: "Remote"
    remote: true
  - location: "San Francisco CA"
    remote: false
  - location: "New York NY"
    remote: false
  - location: "Austin TX"
    remote: false
  - location: "Seattle WA"
    remote: false

boards:
  - indeed
  - linkedin
  - glassdoor

defaults:
  results_per_site: 50      # Keep lower for the popular list — volume control
  hours_old: 48

exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
