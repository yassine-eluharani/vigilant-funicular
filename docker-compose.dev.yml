name: applypilot

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        # Required for PDF generation (resume / cover letter downloads)
        - INSTALL_PLAYWRIGHT=true
    command: uvicorn applypilot.web.server:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - data:/data
      - ./backend/src:/app/src   # Hot reload: mount source
    environment:
      - APPLYPILOT_DIR=/data
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://localhost:3000
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    # INF-022: rely on the Dockerfile's `deps` stage for installs. Running
    # `npm install` on every container start was both slow and could drift
    # against the lockfile that `npm ci` baked into the image.
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app           # Hot reload: mount source
      - /app/node_modules         # Keep container node_modules separate from host
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    restart: "no"
    depends_on:
      - backend
