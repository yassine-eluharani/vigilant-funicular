name: applypilot

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: uvicorn applypilot.web.server:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - data:/data
      - ./backend/src:/app/src   # Hot reload: mount source
    environment:
      - APPLYPILOT_DIR=/data
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://localhost:3000
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app           # Hot reload: mount source
      - /app/node_modules         # Exclude node_modules from host mount
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    restart: "no"
    depends_on:
      - backend
