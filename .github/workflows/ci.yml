name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        # The PDF-generation path (scoring/pdf.py text_to_pdf_bytes) launches
        # Chromium via Playwright; the multi-user isolation test exercises it
        # end-to-end. Without --with-deps the apt packages Chromium needs
        # aren't present on the runner.
        run: python -m playwright install --with-deps chromium

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test (pytest)
        run: pytest tests/ -v

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_YnVpbGQtZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA
          BACKEND_URL: http://backend:8000
        run: npm run build

      - name: Test (vitest)
        run: npm run test:run

      # E2E tests (TST-020). All `/api/*` calls are stubbed so no backend or
      # external services are required. Chromium is installed once via
      # `playwright install --with-deps` (the deps are apt packages, hence
      # `--with-deps`). Tests live in frontend/e2e/.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npx playwright test
        env:
          CI: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_YnVpbGQtZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA
          # `clerkMiddleware()` (frontend/proxy.ts) calls `auth()` for any
          # protected route — auth() throws if CLERK_SECRET_KEY is unset, so
          # the dev server appears to start but every /apply hit 500s and
          # the webServer wait times out. Inject a syntactically valid dummy
          # so the middleware initialises; it'll still 401 because there's
          # no real Clerk session, which is what the redirect test asserts.
          CLERK_SECRET_KEY: sk_test_ZHVtbXktY2ktY2xlcmstc2VjcmV0LWtleS1ub3QtcmVhbA
