name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test (pytest)
        run: pytest tests/ -v

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_build
          BACKEND_URL: http://backend:8000
        run: npm run build

      - name: Test (vitest)
        run: npm run test:run

      # E2E tests (TST-020). All `/api/*` calls are stubbed so no backend or
      # external services are required. Chromium is installed once via
      # `playwright install --with-deps` (the deps are apt packages, hence
      # `--with-deps`). Tests live in frontend/e2e/.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npx playwright test
        env:
          CI: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_build
